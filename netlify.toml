# Template pages (hierarchical) - Serve static HTML to bots
[[redirects]]
  from = "/templates/*"
  to = "/templates/:splat/index.html"
  status = 200
  force = true
  conditions = {User-Agent = ["*bot*", "*Bot*", "*BOT*", "*crawler*", "*Crawler*", "*spider*", "*Spider*", "*Googlebot*", "*Bingbot*", "*DuckDuckBot*", "*YandexBot*", "*facebookexternalhit*", "*LinkedInBot*", "*TwitterBot*", "*APIs-Google*", "*Slurp*", "*Baidu*", "*msnbot*", "*Teoma*", "*AdsBot*"]}

# ============================================
# SPA Routing for Human Users
# These rules apply AFTER bot detection rules
# ============================================

[[redirects]]
  from = "/templates/*"
  to = "/index.html"
  status = 200
  force = true

# ============================================
# SPA Fallback (MUST be last)
# ============================================

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
