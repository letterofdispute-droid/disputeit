[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# ============================================
# URL Canonicalization (Force HTTPS & non-www)
# ============================================

[[redirects]]
  from = "http://disputeletters.com/*"
  to = "https://disputeletters.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.disputeletters.com/*"
  to = "https://disputeletters.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.disputeletters.com/*"
  to = "https://disputeletters.com/:splat"
  status = 301
  force = true

# ============================================
# Sitemap Redirects (serve directly)
# ============================================

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemaps/sitemap-index.xml"
  status = 200

[[redirects]]
  from = "/sitemaps/*"
  to = "/sitemaps/:splat"
  status = 200

# ============================================
# Legacy URL Redirects (301 for SEO)
# ============================================

# Redirect old category URLs to new templates URLs
[[redirects]]
  from = "/category/:categoryId"
  to = "/templates/:categoryId"
  status = 301
  force = true

# Redirect old complaint-letter URLs to new hierarchical URLs
# Note: The actual redirect logic is handled by React Router in LegacyTemplateRedirect
# This just ensures SPA routing works for legacy URLs
[[redirects]]
  from = "/complaint-letter/*"
  to = "/index.html"
  status = 200
  force = true

# ============================================
# Static HTML for Search Engine Bots
# Bot detection rules MUST come before SPA rules
# ============================================

# Homepage - Serve static HTML to bots
[[redirects]]
  from = "/"
  to = "/static/index.html"
  status = 200
  force = true
  conditions = {User-Agent = ["*bot*", "*Bot*", "*BOT*", "*crawler*", "*Crawler*", "*spider*", "*Spider*", "*Googlebot*", "*Bingbot*", "*DuckDuckBot*", "*YandexBot*", "*facebookexternalhit*", "*LinkedInBot*", "*TwitterBot*", "*APIs-Google*", "*Slurp*", "*Baidu*", "*msnbot*", "*Teoma*", "*AdsBot*"]}

